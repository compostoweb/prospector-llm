services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env.prod
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  worker-capture:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.prod
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker -Q capture -c 2 --loglevel=warning
    restart: always

  worker-dispatch:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.prod
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker -Q dispatch -c 4 --loglevel=warning
    restart: always

  worker-cadence:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.prod
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker -Q cadence -c 1 --loglevel=warning
    restart: always

  worker-enrich:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.prod
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker -Q enrich -c 2 --loglevel=warning
    restart: always

  worker-content:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.prod
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker -Q content -c 2 --loglevel=warning
    restart: always

  worker-content-engagement:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.prod
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker -Q content-engagement -c 2 --loglevel=warning
    restart: always

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.prod
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app beat --loglevel=warning
    restart: always

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    ports:
      - "5555:5555"
    env_file: .env.prod
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

volumes:
  redis_data:

# Nota: NÃO há serviço postgres aqui.
# O banco é remoto (Neon ou Supabase) configurado em .env.prod
# Voicebox roda como projeto separado no EasyPanel (ver ../voicebox-server/)
