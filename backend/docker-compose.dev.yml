services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env.dev
    environment:
      - ENV=dev
    volumes:
      - .:/app          # hot reload no dev
    depends_on:
      - redis
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker-general:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.dev
    environment:
      - ENV=dev
    volumes:
      - .:/app
    depends_on:
      - redis
    command: celery -A workers.celery_app worker -Q capture,enrich,cadence,dispatch -c 4 --loglevel=info
    restart: unless-stopped

  worker-content:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.dev
    environment:
      - ENV=dev
    volumes:
      - .:/app
    depends_on:
      - redis
    command: celery -A workers.celery_app worker -Q content,content-engagement -c 2 --loglevel=info
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env.dev
    environment:
      - ENV=dev
    volumes:
      - .:/app
    depends_on:
      - redis
    command: celery -A workers.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    ports:
      - "5555:5555"
    env_file: .env.dev
    environment:
      - ENV=dev
    depends_on:
      - redis
    command: celery -A workers.celery_app flower --port=5555
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

# Nota: NÃO há serviço postgres aqui.
# O banco é remoto (Neon ou Supabase) configurado em .env.dev
# Voicebox roda como projeto separado no EasyPanel (ver ../voicebox-server/)
