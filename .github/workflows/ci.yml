name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-static:
    name: Backend Static Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Python compile smoke test
        run: python -m compileall api core integrations models schemas services workers scheduler

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: prospector_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prospector_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENV: dev
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/prospector_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/prospector_test
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
      SECRET_KEY: ci-secret-key-with-at-least-32-characters
      FRONTEND_URL: http://localhost:3000
      API_PUBLIC_URL: http://localhost:8000
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Apply migrations
        run: python -m alembic upgrade head

      - name: Run focused HTTP tests
        run: |
          python -m pytest \
            tests/test_api/test_auth.py \
            tests/test_api/test_content_posts.py \
            tests/test_api/test_security_audit_logs.py \
            -q

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/events
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      API_URL: http://localhost:8000
      AUTH_SECRET: ci-placeholder-secret-with-32-characters-minimum
      AUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-placeholder-secret-with-32-characters-minimum
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install --no-fund --no-audit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  extension:
    name: Extension Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install extension dependencies
        run: npm install --no-fund --no-audit

      - name: Build
        run: npm run build